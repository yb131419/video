<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 🎞️影片生成系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        progress {
            width: 100%;
            height: 12px;
            appearance: none;
            margin-top: 8px;
        }
        ::-webkit-progress-bar {
            background-color: #e5e7eb;
            border-radius: 6px;
        }
        ::-webkit-progress-value {
            background-color: #22c55e;
            border-radius: 6px;
        }
        video {
            max-height: 400px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex justify-center items-center">
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-md p-6">
        <h2 class="text-2xl font-bold text-center mb-4">🎙️ 彥彬 AI 影片生成系統</h2>

        <!-- 声音选择 -->
        <div class="bg-blue-50 p-4 rounded-xl mb-5 border border-blue-200">
            <h3 class="font-bold text-blue-700 mb-2">選擇語音</h3>
            <select id="voiceMode" class="w-full border p-2 rounded mb-2">
                <option value="free">免費語音（推薦）</option>
            </select>
        </div>

        <!-- 视频上传 -->
        <div class="mb-4">
            <label class="font-medium block mb-1">上傳MP4視頻</label>
            <p class="text-xs text-red-600 font-medium mb-1">⚠️ 限制大小：20MB 以內，避免處理逾時</p>
            <input type="file" id="videoFile" accept="video/mp4" class="w-full border p-2 rounded">
        </div>

        <!-- 文案输入 -->
        <div class="mb-4">
            <label class="font-medium block mb-1">配音文案</label>
            <textarea id="content" rows="3" class="w-full border p-2 rounded" placeholder="輸入你要配音的文字"></textarea>
        </div>

        <!-- 语速调节 -->
        <div class="mb-3">
            <div class="flex justify-between">
                <span>語速</span>
                <span id="speedVal" class="text-blue-600">1.0x</span>
            </div>
            <input type="range" id="speed" min="0.7" max="1.3" step="0.05" value="1.0" class="w-full">
        </div>

        <!-- 情绪柔和度调节 -->
        <div class="mb-5">
            <div class="flex justify-between">
                <span>情緒柔和度</span>
                <span id="stableVal" class="text-blue-600">0.7</span>
            </div>
            <input type="range" id="stability" min="0.4" max="0.9" step="0.05" value="0.7" class="w-full">
        </div>

        <!-- 生成按钮 -->
        <button id="genBtn" class="w-full bg-green-600 text-white py-3 rounded font-bold">
            生成配音 + 字幕
        </button>

        <!-- 进度条 + 状态 -->
        <div id="progressArea" class="hidden mt-4">
            <div id="statusText" class="text-center font-medium mb-1">處理中：0%</div>
            <progress id="progressBar" value="0" max="100"></progress>
        </div>

        <!-- 视频预览（100%可用） -->
        <div id="videoPreview" class="mt-4 hidden">
            <h3 class="font-medium text-center mb-2">🎬 線上預覽</h3>
            <video id="player" controls class="w-full rounded border"></video>
        </div>

        <!-- 下载按钮 -->
        <div id="result" class="mt-4 p-3 bg-green-50 rounded hidden text-center">
            <p class="font-medium">✅ 處理完成！</p>
            <a id="downloadBtn" class="inline-block mt-2 bg-blue-600 text-white px-4 py-2 rounded">📥 下載影片</a>
        </div>

        <!-- 历史记录（关闭网页仍存在） -->
        <div id="historySection" class="mt-6 hidden">
            <h3 class="font-bold text-gray-700 mb-2">📂 上一次生成的影片</h3>
            <button id="playLast" class="w-full bg-gray-100 py-2 rounded mb-2">▶️ 播放上次影片</button>
            <a id="downloadLast" class="w-full bg-blue-600 text-white py-2 rounded">📥 下載上次影片</a>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzqGzi4tNZo5DtedZWgRRhrE8DpAvKLZW83rp7xyXLkxfautVX0IVCX67VjdtiFpFCMmw/exec";
    
    // DOM元素
    const speed = document.getElementById("speed");
    const stability = document.getElementById("stability");
    const progressBar = document.getElementById("progressBar");
    const statusText = document.getElementById("statusText");
    const player = document.getElementById("player");
    const downloadBtn = document.getElementById("downloadBtn");
    const playLast = document.getElementById("playLast");
    const downloadLast = document.getElementById("downloadLast");

    // 加载本地历史记录
    window.onload = loadHistory();
    speed.oninput = () => document.getElementById("speedVal").innerText = speed.value + "x";
    stability.oninput = () => document.getElementById("stableVal").innerText = stability.value;

    // 1%慢速进度条
    function startProgress() {
        let p = 0;
        document.getElementById("progressArea").classList.remove("hidden");
        return setInterval(() => {
            p += 1;
            if(p > 95) p = 95;
            progressBar.value = p;
            statusText.innerText = `處理中：${p}%`;
        }, 300);
    }

    // 保存历史
    function saveHistory(url) {
        localStorage.setItem("LAST_VIDEO", url);
        loadHistory();
    }

    // 读取历史
    function loadHistory() {
        const last = localStorage.getItem("LAST_VIDEO");
        if(last) {
            document.getElementById("historySection").classList.remove("hidden");
            playLast.onclick = () => {
                document.getElementById("videoPreview").classList.remove("hidden");
                player.src = last;
                player.play();
            };
            downloadLast.href = last;
            downloadLast.download = "影片.mp4";
        }
    }

    // 生成视频
    document.getElementById("genBtn").onclick = async () => {
        const video = document.getElementById("videoFile").files[0];
        const content = document.getElementById("content").value.trim();
        
        if(!video || !content) { alert("請上傳影片+輸入文案"); return; }
        if(video.size > 20*1024*1024) { alert("影片超過20MB"); return; }

        const btn = document.getElementById("genBtn");
        btn.disabled = true;
        const timer = startProgress();

        try {
            const reader = new FileReader();
            reader.readAsDataURL(video);
            
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "generate",
                        base64, content,
                        speed: speed.value,
                        stability: stability.value
                    })
                });

                // 接收视频流 生成本地链接
                const blob = await res.blob();
                const videoUrl = URL.createObjectURL(blob);

                // 预览 + 下载
                clearInterval(timer);
                progressBar.value = 100;
                statusText.innerText = "✅ 處理完成！";
                statusText.style.color = "green";
                
                document.getElementById("videoPreview").classList.remove("hidden");
                document.getElementById("result").classList.remove("hidden");
                player.src = videoUrl;
                downloadBtn.href = videoUrl;
                downloadBtn.download = "生成影片.mp4";

                saveHistory(videoUrl);
                btn.disabled = false;
            };
        } catch (err) {
            alert("處理失敗："+err.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
