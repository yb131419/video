<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 🎞️影片生成系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <style>
        progress {
            width: 100%;
            height: 12px;
            appearance: none;
            margin-top: 8px;
        }
        ::-webkit-progress-bar {
            background-color: #e5e7eb;
            border-radius: 6px;
        }
        ::-webkit-progress-value {
            background-color: #22c55e;
            border-radius: 6px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex justify-center items-center">
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-md p-6">
        <h2 class="text-2xl font-bold text-center mb-4">🎙️ 彥彬 AI 影片生成系統</h2>

        <!-- 声音选择 -->
        <div class="bg-blue-50 p-4 rounded-xl mb-5 border border-blue-200">
            <h3 class="font-bold text-blue-700 mb-2">選擇語音</h3>
            <select id="voiceMode" class="w-full border p-2 rounded mb-2">
                <option value="free">免費語音（推薦）</option>
                <option value="custom">自訂克隆語音（付費）</option>
            </select>

            <div id="cloneArea" class="hidden mt-3">
                <p class="text-xs text-gray-500 mb-2">上傳30-60秒無雜音錄音(m4a/mp3/wav)</p>
                <input type="file" id="voiceFile" accept="audio/m4a,audio/mp3,audio/wav,audio/x-m4a" class="w-full border p-2 rounded mb-2">
                <input type="text" id="voiceName" placeholder="給聲音起名" class="w-full border p-2 rounded mb-2">
                <button id="cloneBtn" class="w-full bg-blue-600 text-white py-2 rounded">克隆我的聲音</button>
                <div id="cloneTip" class="text-sm mt-2 hidden"></div>
            </div>
        </div>

        <!-- 视频上传 -->
        <div class="mb-4">
            <label class="font-medium block mb-1">上傳MP4視頻</label>
            <p class="text-xs text-red-600 font-medium mb-1">⚠️ 限制大小：20MB 以內，避免處理逾時</p>
            <input type="file" id="videoFile" accept="video/mp4" class="w-full border p-2 rounded">
        </div>

        <!-- 文案输入 -->
        <div class="mb-4">
            <label class="font-medium block mb-1">配音文案</label>
            <textarea id="content" rows="3" class="w-full border p-2 rounded" placeholder="輸入你要配音的文字"></textarea>
        </div>

        <!-- 语速调节 -->
        <div class="mb-3">
            <div class="flex justify-between">
                <span>語速</span>
                <span id="speedVal" class="text-blue-600">1.0x</span>
            </div>
            <input type="range" id="speed" min="0.7" max="1.3" step="0.05" value="1.0" class="w-full">
        </div>

        <!-- 情绪柔和度调节 -->
        <div class="mb-5">
            <div class="flex justify-between">
                <span>情緒柔和度</span>
                <span id="stableVal" class="text-blue-600">0.7</span>
            </div>
            <input type="range" id="stability" min="0.4" max="0.9" step="0.05" value="0.7" class="w-full">
        </div>

        <!-- 生成按钮 -->
        <button id="genBtn" class="w-full bg-green-600 text-white py-3 rounded font-bold">
            生成配音 + 字幕
        </button>

        <!-- 进度条 + 状态 -->
        <div id="progressArea" class="hidden mt-4">
            <div id="statusText" class="text-center font-medium mb-1">處理中：0%</div>
            <progress id="progressBar" value="0" max="100"></progress>
        </div>

        <!-- 历史记录（关闭网页还在） -->
        <div id="historySection" class="mt-6 hidden">
            <h3 class="font-bold text-gray-700 mb-2">📂 上一次生成檔案</h3>
            <div class="bg-gray-50 p-3 rounded-lg border text-sm">
                <p class="mb-1">視頻：<a id="hVideo" download class="text-blue-600">下載</a></p>
                <p class="mb-1">配音：<a id="hAudio" download class="text-blue-600">下載</a></p>
                <p>字幕：<a id="hSub" download class="text-blue-600">下載</a></p>
            </div>
        </div>

        <!-- 结果展示 -->
        <div id="result" class="mt-4 p-3 bg-green-50 rounded hidden">
            <p class="font-medium">✅ 處理完成！</p>
            <p class="text-sm mt-1">視頻：<a id="vUrl" target="_blank" download class="text-blue-60 break-all">下載</a></p>
            <p class="text-sm mt-1">配音：<a id="aUrl" target="_blank" download class="text-blue-60 break-all">下載</a></p>
            <p class="text-sm mt-1">字幕：<a id="sUrl" target="_blank" download class="text-blue-60 break-all">下載</a></p>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzqGzi4tNZo5DtedZWgRRhrE8DpAvKLZW83rp7xyXLkxfautVX0IVCX67VjdtiFpFCMmw/exec";
    let MY_VOICE_ID = localStorage.getItem("MY_VOICE_ID") || "";

    const speed = document.getElementById("speed");
    const stability = document.getElementById("stability");
    const voiceMode = document.getElementById("voiceMode");
    const cloneArea = document.getElementById("cloneArea");
    const progressArea = document.getElementById("progressArea");
    const progressBar = document.getElementById("progressBar");
    const statusText = document.getElementById("statusText");

    // 读取历史记录
    function loadHistory() {
        const hist = JSON.parse(localStorage.getItem("LAST_RESULT") || "null");
        if (hist) {
            document.getElementById("hVideo").href = hist.video;
            document.getElementById("hAudio").href = hist.audio;
            document.getElementById("hSub").href = hist.subtitle;
            document.getElementById("historySection").classList.remove("hidden");
        }
    }

    // 保存历史记录
    function saveHistory(video, audio, subtitle) {
        const data = { video, audio, subtitle };
        localStorage.setItem("LAST_RESULT", JSON.stringify(data));
        loadHistory();
    }

    voiceMode.onchange = () => {
        cloneArea.classList.toggle("hidden", voiceMode.value !== "custom");
    };

    speed.oninput = () => document.getElementById("speedVal").innerText = speed.value + "x";
    stability.oninput = () => document.getElementById("stableVal").innerText = stability.value;

    // 进度条
    function startProgress() {
        progressArea.classList.remove("hidden");
        let percent = 0;
        const interval = setInterval(() => {
            percent += 5;
            if (percent > 95) percent = 95;
            progressBar.value = percent;
            statusText.innerText = `處理中：${percent}%`;
        }, 600);
        return interval;
    }

    // M4A 轉 MP3
    async function convertToMp3(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.decodeAudioData(arrayBuffer).then(buffer => {
                    const sampleRate = 44100;
                    const mp3enc = new lamejs.Mp3Encoder(1, sampleRate, 128);
                    const leftChannel = buffer.getChannelData(0);
                    const data = [];

                    const floatTo16 = (floatArr) => {
                        const int16 = new Int16Array(floatArr.length);
                        for (let i = 0; i < floatArr.length; i++) {
                            let s = Math.max(-1, Math.min(1, floatArr[i]));
                            int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        return int16;
                    };

                    const left16 = floatTo16(leftChannel);
                    const mp3buf = mp3enc.encodeBuffer(left16);
                    if (mp3buf.length > 0) data.push(mp3buf);
                    const end = mp3enc.flush();
                    if (end.length > 0) data.push(end);

                    const blob = new Blob(data, { type: 'audio/mp3' });
                    resolve(blob);
                }).catch(reject);
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // 克隆聲音
    document.getElementById("cloneBtn").onclick = async () => {
        const file = document.getElementById("voiceFile").files[0];
        const name = document.getElementById("voiceName").value.trim();
        const tip = document.getElementById("cloneTip");

        if (!file || !name) { alert("請上傳錄音並填寫名稱"); return; }
        tip.classList.remove("hidden");
        tip.innerText = "🔄 轉檔中...";
        tip.style.color = "blue";

        try {
            const mp3Blob = await convertToMp3(file);
            const reader = new FileReader();
            reader.readAsDataURL(mp3Blob);
            reader.onload = async function(e) {
                const base64 = e.target.result.split(',')[1];
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "clone",
                        name: name,
                        base64: base64
                    })
                });
                const data = await res.json();
                if (data.success) {
                    MY_VOICE_ID = data.voice_id;
                    localStorage.setItem("MY_VOICE_ID", MY_VOICE_ID);
                    tip.innerText = "✅ 克隆成功！";
                    tip.style.color = "green";
                } else {
                    tip.innerText = "❌ 失敗：免費帳號不支援克隆";
                    tip.style.color = "red";
                }
            };
        } catch (err) {
            tip.innerText = "❌ 轉檔失敗";
            tip.style.color = "red";
        }
    };

    // 生成配音
    document.getElementById("genBtn").onclick = async () => {
        const video = document.getElementById("videoFile").files[0];
        const content = document.getElementById("content").value.trim();
        const mode = voiceMode.value;

        if (!video || !content) {
            alert("請上傳影片 + 輸入文案");
            return;
        }

        if (video.size > 20 * 1024 * 1024) {
            alert("⚠️ 影片超過 20MB，請壓縮後再上傳");
            return;
        }

        const btn = document.getElementById("genBtn");
        const result = document.getElementById("result");
        btn.disabled = true;
        result.classList.add("hidden");
        
        const progressTimer = startProgress();

        try {
            const reader = new FileReader();
            reader.readAsDataURL(video);

            reader.onload = async function(e) {
                const base64 = e.target.result.split(',')[1];
                
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "generate",
                        voice_mode: mode,
                        voice_id: MY_VOICE_ID,
                        filename: video.name,
                        filetype: video.type,
                        base64: base64,
                        content: content,
                        speed: speed.value,
                        stability: stability.value
                    })
                });

                clearInterval(progressTimer);
                progressBar.value = 100;
                statusText.innerText = "處理中：100%";

                const data = await res.json();
                if (data.success) {
                    statusText.innerText = "✅ 處理完成！";
                    statusText.style.color = "green";
                    
                    document.getElementById("vUrl").href = data.video;
                    document.getElementById("aUrl").href = data.audio;
                    document.getElementById("sUrl").href = data.subtitle;
                    result.classList.remove("hidden");

                    // 保存历史记录
                    saveHistory(data.video, data.audio, data.subtitle);
                } else {
                    statusText.innerText = "❌ 失敗：" + data.msg;
                    statusText.style.color = "red";
                }
                btn.disabled = false;
            };

            reader.onerror = function() {
                clearInterval(progressTimer);
                statusText.innerText = "❌ 讀取影片失敗";
                statusText.style.color = "red";
                btn.disabled = false;
            };
        } catch (err) {
            clearInterval(progressTimer);
            statusText.innerText = "❌ 網路錯誤";
            statusText.style.color = "red";
            btn.disabled = false;
        }
    };

    // 启动时加载历史
    window.onload = loadHistory;
</script>
</body>
</html>
